[LLM_SETTINGS]
MODEL_NAME = deepseek-chat
TEMPERATURE = 0.1
MAX_STEPS = 25
BASE_URL = https://api.deepseek.com

[SANDBOX_CONFIG]
COMMAND_TIMEOUT = 60
ALLOW_NETWORK = True

[PATHS]
LOG_OUTPUT_DIR = data/raw_logs/
SYSTEM_PROMPT_PATH = prompts/system_prompt.txt

[AGENT_CONFIG]
ALLOWED_TOOLS = run_bash_command, read_file, write_file